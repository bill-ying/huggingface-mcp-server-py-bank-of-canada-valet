# ── SonarCloud project configuration ─────────────────────────────────────────
# https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/sonarcloud-github-action/

sonar.projectKey=bill-ying_huggingface-mcp-server-py-bank-of-canada-valet
sonar.organization=bill-ying

# Source and test paths
sonar.sources=src
sonar.tests=tests
sonar.language=py

# Coverage report (generated by pytest --cov-report=xml)
sonar.python.coverage.reportPaths=coverage.xml

# Exclude test files from main code analysis
sonar.exclusions=tests/**

# Encoding
sonar.sourceEncoding=UTF-8
